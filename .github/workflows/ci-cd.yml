name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and run tests with Maven
        run: mvn clean package -B
        shell: powershell

      - name: Stop and remove existing containers
        run: |
          docker compose down
          docker rm -f psyche-mysql 2>$null
          docker rm -f psyche-app 2>$null
        shell: powershell
        continue-on-error: true

      - name: Build and start containers
        run: docker compose up -d --build
        shell: powershell

      - name: Wait for app to be healthy
        run: |
          Start-Sleep -Seconds 30
          docker ps
        shell: powershell

      - name: Show app logs
        run: docker logs psyche-app --tail 80
        shell: powershell
