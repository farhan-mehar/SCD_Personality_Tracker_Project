# ══════════════════════════════════════════════════════════════════
# Psyche — GitHub Actions CI/CD Pipeline
# ══════════════════════════════════════════════════════════════════
#
# JOBS:
#   1. test     → Maven build + unit tests + JaCoCo coverage
#   2. docker   → Build & push Docker image to Docker Hub  (on main/master only)
#   3. deploy   → SSH into server and pull new image        (optional, on main/master only)
#
# REQUIRED SECRETS (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME      → your Docker Hub username
#   DOCKERHUB_TOKEN         → Docker Hub Access Token (not password)
#   MYSQL_ROOT_PASSWORD     → MySQL root password for tests
#   SPRING_MAIL_USERNAME    → Gmail address
#   SPRING_MAIL_PASSWORD    → Gmail App Password
#
# OPTIONAL SECRETS (only needed if you enable the deploy job):
#   DEPLOY_HOST             → SSH server IP / hostname
#   DEPLOY_USER             → SSH username (e.g. ubuntu)
#   DEPLOY_SSH_KEY          → private SSH key (id_rsa content)
# ══════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/psyche-app

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ──────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass_ci
          MYSQL_DATABASE: psyche_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -prootpass_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        run: mvn clean verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/psyche_db_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: rootpass_ci
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: fake_password_for_ci
          SPRING_MAIL_HOST: smtp.gmail.com
          SPRING_MAIL_PORT: "587"

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # Runs only on push to main/master (not on PRs)
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details
        run: echo "Image pushed → ${{ env.IMAGE_NAME }}:latest"

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Server (OPTIONAL)
