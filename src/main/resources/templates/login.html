<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Psyche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">✦</div>
      <h1 class="brand-name">Psyche</h1>
      <p class="brand-sub">Understand yourself. Grow every day.</p>
    </div>

    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${logout}"  class="alert alert-success" th:text="${logout}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form action="/login" method="post" class="auth-form">
      <!-- CSRF Token — Spring Security requires this -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="username" class="form-input"
               placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-input"
               placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-auth">Sign In →</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="/signup">Create one free</a></p>
  </div>

  <div class="auth-visual">
    <div class="visual-content">
      <h2>Track your personality.<br/>Build better habits.<br/><em>Become your best self.</em></h2>
      <div class="visual-stats">
        <div class="vs"><span>20</span><small>Questions</small></div>
        <div class="vs"><span>5</span><small>Traits Tracked</small></div>
        <div class="vs"><span>🔥</span><small>Daily Streaks</small></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
