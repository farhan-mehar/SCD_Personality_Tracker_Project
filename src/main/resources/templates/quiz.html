<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Quiz — Psyche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-body">

<nav class="navbar">
  <a href="/dashboard" class="nav-brand">✦ Psyche</a>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/quiz"      class="nav-link active">Quiz</a>
    <a href="/learn"     class="nav-link">Learn</a>
    <a href="/profile"   class="nav-link">Profile</a>
    <form action="/logout" method="post" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="nav-link nav-logout" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:.9rem;padding:.4rem .75rem;border-radius:6px">Logout</button>
    </form>
  </div>
</nav>

<main class="app-main">
  <div class="quiz-wrap">

    <!-- Header -->
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="quiz-step" th:text="'Question ' + ${questionNum} + ' of ' + ${totalQ}">1 of 20</span>
        <span class="quiz-trait" th:text="${question.trait}">Trait</span>
      </div>
      <!-- Progress bar -->
      <div class="quiz-progress-track">
        <div class="quiz-progress-fill" th:style="'width:' + ${progress} + '%'"></div>
      </div>
      <div class="quiz-pct" th:text="${progress} + '% complete'">0%</div>
    </div>

    <!-- Error message -->
    <div class="quiz-error" th:if="${error}" th:text="${error}">
      You must select an answer before proceeding.
    </div>

    <!-- Question card -->
    <div class="question-card">
      <p class="question-text" th:text="${question.text}">Question text</p>

      <form th:action="@{/quiz/question/{n}(n=${questionNum})}" method="post" id="quizForm"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="options-list">
          <label class="option-label" th:each="opt : ${question.options}">
            <input type="radio" name="answer" th:value="${opt.value}"
                   th:checked="${prevAnswer != null and prevAnswer == opt.value}"/>
            <span class="option-text" th:text="${opt.label}">Option</span>
          </label>
        </div>

        <div class="quiz-nav">
          <a th:href="${questionNum > 1} ? @{/quiz/question/{n}(n=${questionNum - 1})} : '/quiz'"
             class="btn-ghost" th:if="${questionNum > 1}">← Back</a>
          <span th:if="${questionNum == 1}"></span>

          <button type="submit" class="btn-primary" id="nextBtn"
                  th:text="${isLast} ? 'Submit Quiz →' : 'Next Question →'">Next</button>
        </div>
      </form>
    </div>

    <!-- Step dots -->
    <div class="step-dots">
      <span th:each="i : ${#numbers.sequence(1, totalQ)}"
            th:class="${i < questionNum} ? 'dot done' : (${i == questionNum} ? 'dot active' : 'dot')"></span>
    </div>

  </div>
</main>

<script th:src="@{/js/quiz.js}"></script>
</body>
</html>
