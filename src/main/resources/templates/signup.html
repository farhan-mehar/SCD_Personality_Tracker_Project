<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign Up — Psyche</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">✦</div>
      <h1 class="brand-name">Psyche</h1>
      <p class="brand-sub">Create your free account</p>
    </div>

    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form action="/signup" method="post" class="auth-form">
      <!-- CSRF Token -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullName" class="form-input"
               placeholder="Your full name" required autofocus/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-input"
               placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-input"
               placeholder="At least 6 characters" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" class="form-input"
               placeholder="Repeat your password" required/>
      </div>
      <button type="submit" class="btn-auth">Create Account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <div class="auth-visual">
    <div class="visual-content">
      <h2>Your personality journey<br/>starts <em>right here.</em></h2>
      <ul class="visual-features">
        <li>✦ 20-question personality quiz</li>
        <li>✦ Personalized improvement plan</li>
        <li>✦ Daily habit tracker with streaks</li>
        <li>✦ Progress dashboard</li>
        <li>✦ Daily email reminders</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
